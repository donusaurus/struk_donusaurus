<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struk Donusaurus</title>
</head>

<body>
<div style="font-family:monospace;padding:20px">Memuat struk...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

window.addEventListener("load", loadReceipt);

function getParam(name){
  return new URL(window.location.href).searchParams.get(name);
}

function toNumber(n){
  return Number(String(n || "0").replace(/[^\d]/g, "")) || 0;
}

function rp(n){
  return toNumber(n).toLocaleString("id-ID");
}

function orderNo(n){
  return String(n || "").replace(/[^\d]/g, "").padStart(3, "0");
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function safeSplit(v){
  return String(v || "").split(" | ");
}

function getQtyFromItem(item){
  let match = String(item || "").match(/^(\d+)x/i);
  return match ? Number(match[1]) : 1;
}

function shortItemName(item){
  return String(item || "")
    .replace("Box Donat (6 pcs)", "Box (6 pcs)")
    .replace("Pcs Donat", "Pcs Donat");
}

function parseAddOnLine(text){
  const line = String(text || "").trim();
  const match = line.match(/^(.*?)\s*=\s*Rp([\d.]+)$/i);
  if(!match){
    return { label: line, total: 0 };
  }
  return {
    label: match[1].trim(),
    total: toNumber(match[2])
  };
}

function renderDetailLines(text){
  return String(text || "")
    .split(", ")
    .map(x => x.trim())
    .filter(x => x && x !== "-")
    .map(x => `<div class="flavor">- ${escapeHtml(x)}</div>`)
    .join("");
}

async function loadReceipt(){
  let id = getParam("id");

  if(!id){
    document.body.innerHTML = "ID struk tidak ditemukan";
    return;
  }

  try{
    let res = await fetch(API_URL + "?id=" + encodeURIComponent(id));
    let data = await res.json();

    if(data.error){
      document.body.innerHTML = data.message || "Struk tidak ditemukan";
      return;
    }

    showReceipt(data);

  }catch(err){
    document.body.innerHTML = "Gagal memuat struk: " + err.message;
  }
}

function showReceipt(data){
  let items = safeSplit(data.item);
  let rasa = safeSplit(data.rasa);
  let harga = safeSplit(data.harga);
  let rows = "";
  let addOnRows = "";
  let addOns = safeSplit(data.addOn).filter(x => x && x !== "-");
  let isCanceled = String(data.status || "").toLowerCase() === "dibatalkan";

  items.forEach((it, i) => {
    if(!it || it === "-") return;

    let lineTotal = toNumber(harga[i] || data.total);
    let qty = getQtyFromItem(it);
    let hargaSatuan = qty > 0 ? lineTotal / qty : lineTotal;

    rows += `
      <div class="item-line">
        <span>${escapeHtml(shortItemName(it))} @Rp${rp(hargaSatuan)}</span>
        <b>Rp${rp(lineTotal)}</b>
      </div>
    `;

    rows += renderDetailLines(rasa[i]);
    rows += `<div class="item-gap"></div>`;
  });

  if(addOns.length){
    addOnRows += `<hr><div class="section"><div class="section-title">Add On</div>`;
    addOns.forEach(line => {
      const item = parseAddOnLine(line);
      addOnRows += `
        <div class="item-line">
          <span>${escapeHtml(item.label)}</span>
          <b>${item.total ? "Rp" + rp(item.total) : ""}</b>
        </div>
      `;
    });
    addOnRows += `</div>`;
  }

  document.body.innerHTML = `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;600;700&display=swap');

      @page{
        size:58mm auto;
        margin:0;
      }

      body{
        background:white;
        font-family:"Roboto Mono","Droid Sans Mono","Courier New",monospace;
        font-size:10px;
        line-height:1.22;
        color:#000;
        margin:0;
        font-weight:600;
      }

      .receipt{
        width:58mm;
        margin:0 auto;
        padding:3mm 1.5mm 10mm;
        box-sizing:border-box;
      }

      .center{text-align:center}
      .header{margin-bottom:6px}
      .section{margin:7px 0}
      .section-title{font-weight:700;margin-bottom:4px}

      .void-box{
        border:1px dashed #000;
        padding:5px 3px;
        margin:7px 0;
        text-align:center;
        font-weight:700;
      }

      .meta-row{
        display:grid;
        grid-template-columns:18mm 3mm 1fr;
      }

      .item-line{
        display:grid;
        grid-template-columns:1fr auto;
        gap:4px;
        align-items:start;
        font-size:10px;
      }

      .item-line b{
        font-weight:700;
        white-space:nowrap;
      }

      .flavor{padding-left:0}
      .item-gap{height:8px}

      .total-line{
        display:grid;
        grid-template-columns:1fr auto;
        gap:4px;
      }

      .total-line b{
        font-weight:700;
        white-space:nowrap;
      }

      hr{
        border:0;
        border-top:1px dashed #000;
        margin:8px 0;
      }

      .closing{margin-top:8px}

      @media print{
        body{margin:0}
        .receipt{
          width:58mm;
          margin:0;
          padding:3mm 1.5mm 10mm;
        }
      }
    </style>

    <div class="receipt">
      <div class="center header">
        Donusaurus<br>
        Sungai Jawi<br>
        Jl. H Rais A Rahman No.171B
      </div>

      ${isCanceled ? `
        <div class="void-box">
          TRANSAKSI DIBATALKAN<br>
          ${escapeHtml(data.dibatalkanPada || "-")}
        </div>
      ` : ""}

      <hr>

      <div class="section">
        <div class="meta-row"><span>Order ID</span><span>:</span><span>#${orderNo(data.orderID)} / ${escapeHtml(data.kodeUnik)}</span></div>
        <div class="meta-row"><span>Customer</span><span>:</span><span>${escapeHtml(data.nama || "-")} (${escapeHtml(data.sumber || "-")})</span></div>
        <div class="meta-row"><span>Tanggal</span><span>:</span><span>${escapeHtml(data.tanggal)}, ${escapeHtml(data.jam)}</span></div>
        <div class="meta-row"><span>Status</span><span>:</span><span>${escapeHtml(data.status || "Aktif")}</span></div>
        ${isCanceled ? `
          <div class="meta-row"><span>Batal</span><span>:</span><span>${escapeHtml(data.dibatalkanPada || "-")}</span></div>
          <div class="meta-row"><span>Alasan</span><span>:</span><span>${escapeHtml(data.alasanBatal || "-")}</span></div>
        ` : ""}
      </div>

      <hr>

      <div class="section">
        ${rows || "-"}
      </div>

      ${addOnRows}

      <hr>

      <div class="section">
        <div class="total-line">
          <span>Total</span>
          <b>Rp${rp(data.total)}</b>
        </div>
        <div class="meta-row"><span>Metode</span><span>:</span><span>${escapeHtml(data.metode)}</span></div>
      </div>

      <hr>

      <div class="center closing">
        Thank you for your purchase!<br>
        Don't miss your next treat<br>
        Follow @donusaurus for updates
      </div>
    </div>
  `;
}
</script>

</body>
</html>
