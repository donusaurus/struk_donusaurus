<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Struk Donusaurus</title>
</head>

<body>
<div style="font-family:monospace;padding:20px">Memuat struk...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

window.addEventListener("load", loadReceipt);

function getParam(name){
  return new URL(window.location.href).searchParams.get(name);
}

function toNumber(n){
  return Number(String(n || "0").replace(/[^\d]/g, ""));
}

function rp(n){
  return toNumber(n).toLocaleString("id-ID");
}

function orderNo(n){
  return String(n || "").replace(/[^\d]/g, "").padStart(3, "0");
}

function safeSplit(v){
  return String(v || "").split(" | ");
}

function getQtyFromItem(item){
  let match = String(item || "").match(/^(\d+)x/i);
  return match ? Number(match[1]) : 1;
}

function shortItemName(item){
  return String(item || "")
    .replace("Box Donat (6 pcs)", "Box (6 pcs)")
    .replace("Pcs Donat", "Pcs Donat");
}

async function loadReceipt(){
  let id = getParam("id");

  if(!id){
    document.body.innerHTML = "ID struk tidak ditemukan";
    return;
  }

  try{
    let res = await fetch(API_URL + "?id=" + encodeURIComponent(id));
    let data = await res.json();

    if(data.error){
      document.body.innerHTML = data.message || "Struk tidak ditemukan";
      return;
    }

    showReceipt(data);

  }catch(err){
    document.body.innerHTML = "Gagal memuat struk: " + err.message;
  }
}

function showReceipt(data){
  let items = safeSplit(data.item);
  let rasa = safeSplit(data.rasa);
  let harga = safeSplit(data.harga);
  let rows = "";

  items.forEach((it, i) => {
    let lineTotal = toNumber(harga[i] || data.total);
    let qty = getQtyFromItem(it);
    let hargaSatuan = qty > 0 ? lineTotal / qty : lineTotal;

    rows += `
      <div class="item-line">
        <span>${shortItemName(it)} @Rp${rp(hargaSatuan)}</span>
        <b>Rp${rp(lineTotal)}</b>
      </div>
    `;

    String(rasa[i] || "").split(", ").filter(Boolean).forEach(r => {
      rows += `<div class="flavor">- ${r}</div>`;
    });

    rows += `<div class="item-gap"></div>`;
  });

  document.body.innerHTML = `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;600;700&display=swap');

      @page{
        size:58mm auto;
        margin:0;
      }

      body{
        background:white;
        font-family:"Roboto Mono","Droid Sans Mono","Courier New",monospace;
        font-size:11px;
        line-height:1.22;
        color:#000;
        margin:0;
        font-weight:600;
      }

      .receipt{
        width:58mm;
        margin:0 auto;
        padding:3mm 1.5mm 10mm;
        box-sizing:border-box;
      }

      .center{
        text-align:center;
      }

      .header{
        margin-bottom:6px;
      }

      .section{
        margin:7px 0;
      }

      .meta-row{
        display:grid;
        grid-template-columns:18mm 3mm 1fr;
      }

      .item-line{
        display:grid;
        grid-template-columns:1fr auto;
        gap:4px;
        align-items:start;
        font-size:10px;
      }

      .item-line b{
        font-weight:700;
        white-space:nowrap;
      }

      .flavor{
        padding-left:0;
      }

      .item-gap{
        height:8px;
      }

      .total-line{
        display:grid;
        grid-template-columns:1fr auto;
        gap:4px;
      }

      .total-line b{
        font-weight:700;
        white-space:nowrap;
      }

      hr{
        border:0;
        border-top:1px dashed #000;
        margin:8px 0;
      }

      .closing{
        margin-top:8px;
      }

      @media print{
        body{
          margin:0;
        }

        .receipt{
          width:58mm;
          margin:0;
          padding:3mm 1.5mm 10mm;
        }
      }
    </style>

    <div class="receipt">
      <div class="center header">
        Donusaurus<br>
        Cabang Sungai Jawi<br>
        Jl. H Rais A Rahman No.171B
      </div>

      <hr>

      <div class="section">
        <div class="meta-row"><span>Order ID</span><span>:</span><span>#${orderNo(data.orderID)} / ${data.kodeUnik}</span></div>
        <div class="meta-row"><span>Customer</span><span>:</span><span>${data.nama || "-"} (${data.sumber || "-"})</span></div>
        <div class="meta-row"><span>Tanggal</span><span>:</span><span>${data.tanggal}, ${data.jam}</span></div>
      </div>

      <hr>

      <div class="section">
        ${rows}
      </div>

      <hr>

      <div class="section">
        <div class="total-line">
          <span>Total</span>
          <b>Rp${rp(data.total)}</b>
        </div>
        <div class="meta-row"><span>Metode</span><span>:</span><span>${data.metode}</span></div>
      </div>

      <hr>

      <div class="center closing">
        Thank you for your purchase!<br>
        Don't miss your next treat<br>
        Follow @donusaurus for updates
      </div>
    </div>
  `;
}
</script>

</body>
</html>
